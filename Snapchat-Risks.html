            })(() => window.markmap,null,{"content":"Dangers of Snapchat for Under-15s &amp; Young Adults","children":[{"content":"Overall Judgement","children":[{"content":"Snapchat is not uniquely dangerous because &quot;social media&quot; is bad in the abstract","children":[],"payload":{"tag":"li","lines":"10,11"}},{"content":"It is dangerous because it <strong>bundles several high-risk features</strong> inside one youth-heavy app:","children":[{"content":"disappearing-message norms","children":[],"payload":{"tag":"li","lines":"12,13"}},{"content":"camera-first, emotionally intimate communication","children":[],"payload":{"tag":"li","lines":"13,14"}},{"content":"streaks and gamified pressure loops","children":[],"payload":{"tag":"li","lines":"14,15"}},{"content":"friend-suggestion / contact-import / mutual-friend discovery","children":[],"payload":{"tag":"li","lines":"15,16"}},{"content":"public layers (Stories, Spotlight, Public Profiles for 16&#x2013;17s)","children":[],"payload":{"tag":"li","lines":"16,17"}},{"content":"precise location sharing via Snap Map","children":[],"payload":{"tag":"li","lines":"17,18"}},{"content":"AI companion feature (My AI)","children":[],"payload":{"tag":"li","lines":"18,19"}}],"payload":{"tag":"li","lines":"11,19"}},{"content":"For <strong>under-15s</strong>, the combination is especially concerning:","children":[{"content":"less mature risk judgement","children":[],"payload":{"tag":"li","lines":"20,21"}},{"content":"stronger peer-pressure sensitivity","children":[],"payload":{"tag":"li","lines":"21,22"}},{"content":"weaker understanding of permanence, consent, coercion, and leverage","children":[],"payload":{"tag":"li","lines":"22,23"}},{"content":"school/friend networks make online harm hard to escape","children":[],"payload":{"tag":"li","lines":"23,24"}}],"payload":{"tag":"li","lines":"19,24"}},{"content":"For <strong>young adults</strong>, risks persist rather than disappearing at 18:","children":[{"content":"sextortion and intimate-image abuse","children":[],"payload":{"tag":"li","lines":"25,26"}},{"content":"stalking and ex-partner surveillance","children":[],"payload":{"tag":"li","lines":"26,27"}},{"content":"scams and account compromise","children":[],"payload":{"tag":"li","lines":"27,28"}},{"content":"drug sales / counterfeit pills / vape or alcohol exposure","children":[],"payload":{"tag":"li","lines":"28,29"}},{"content":"reputation, campus, work, and legal spillover","children":[],"payload":{"tag":"li","lines":"29,30"}}],"payload":{"tag":"li","lines":"24,30"}},{"content":"<strong>Bottom line</strong>: Snapchat can feel &quot;private&quot; and &quot;casual&quot; &#x2014; that is exactly why many serious harms begin there","children":[],"payload":{"tag":"li","lines":"30,31"}},{"content":"<strong>Best one-line summary</strong>: Snapchat is not a harmless private diary app; it is a high-risk social-messaging environment whose design often makes serious harms feel casual until they become acute","children":[],"payload":{"tag":"li","lines":"31,33"}}],"payload":{"tag":"h2","lines":"9,10"}},{"content":"Why Snapchat Is a Special Case","children":[{"content":"The False-Privacy Illusion","children":[{"content":"The app feels like a private friend space, even when users are dealing with:","children":[{"content":"weak ties and friends-of-friends","children":[],"payload":{"tag":"li","lines":"36,37"}},{"content":"strangers pretending to be peers","children":[],"payload":{"tag":"li","lines":"37,38"}},{"content":"older users who have lied about age or identity","children":[],"payload":{"tag":"li","lines":"38,39"}}],"payload":{"tag":"li","lines":"35,39"}}],"payload":{"tag":"h3","lines":"34,35"}},{"content":"Design That Lowers Inhibition","children":[{"content":"Fast photo/video replies feel informal and low-stakes","children":[],"payload":{"tag":"li","lines":"40,41"}},{"content":"Disappearing chats create a false sense that nothing serious is being created","children":[],"payload":{"tag":"li","lines":"41,42"}},{"content":"Streaks turn contact into <strong>obligation</strong> rather than choice","children":[],"payload":{"tag":"li","lines":"42,43"}},{"content":"Camera-first communication speeds up intimacy","children":[],"payload":{"tag":"li","lines":"43,44"}}],"payload":{"tag":"h3","lines":"39,40"}},{"content":"Mixed Private/Public Modes","children":[{"content":"One app moves a young user through several risk environments quickly:","children":[{"content":"intimate 1:1 chat &#x2192; peer status competition &#x2192; public exposure &#x2192; real-world location exposure","children":[],"payload":{"tag":"li","lines":"46,47"}}],"payload":{"tag":"li","lines":"45,47"}},{"content":"Private chat/Snaps, Stories, Spotlight/creator surfaces, Public Profiles, Snap Map, and Family tools all coexist","children":[],"payload":{"tag":"li","lines":"47,48"}}],"payload":{"tag":"h3","lines":"44,45"}},{"content":"Unique Feature Combination","children":[{"content":"Ephemerality + Snap Map + streaks + Quick Add + anonymous accounts + My AI","children":[],"payload":{"tag":"li","lines":"49,50"}},{"content":"No other major platform bundles all of these simultaneously","children":[],"payload":{"tag":"li","lines":"50,51"}},{"content":"Makes Snapchat the <strong>platform of choice</strong> for predators and dealers","children":[],"payload":{"tag":"li","lines":"51,53"}}],"payload":{"tag":"h3","lines":"48,49"}}],"payload":{"tag":"h2","lines":"33,34"}},{"content":"Why Under-15s Are Especially Vulnerable","children":[{"content":"Developmental Factors","children":[{"content":"Still learning impulse control and long-horizon judgement (prefrontal cortex immature until ~25)","children":[],"payload":{"tag":"li","lines":"55,56"}},{"content":"More likely to confuse attention with trust or affection","children":[],"payload":{"tag":"li","lines":"56,57"}},{"content":"More likely to comply under panic, shame, or social pressure","children":[],"payload":{"tag":"li","lines":"57,58"}},{"content":"Greater panic when threatened; weaker understanding that blackmail demands escalate, not end","children":[],"payload":{"tag":"li","lines":"58,59"}},{"content":"Stronger shame barriers to asking adults for help","children":[],"payload":{"tag":"li","lines":"59,60"}}],"payload":{"tag":"h3","lines":"54,55"}},{"content":"Social Factors","children":[{"content":"School-peer ecosystems are intense and inescapable","children":[],"payload":{"tag":"li","lines":"61,62"}},{"content":"Exclusion, humiliation, and rumour loops travel fast","children":[],"payload":{"tag":"li","lines":"62,63"}},{"content":"&quot;Everyone is doing it&quot; pressures are powerful at this age","children":[],"payload":{"tag":"li","lines":"63,64"}},{"content":"Social standing is fragile and intensely important","children":[],"payload":{"tag":"li","lines":"64,65"}},{"content":"Humiliation at school and online often reinforce each other","children":[],"payload":{"tag":"li","lines":"65,66"}}],"payload":{"tag":"h3","lines":"60,61"}},{"content":"Technical/Platform Factors","children":[{"content":"Under-13s are not meant to be there at all, yet many get on anyway","children":[],"payload":{"tag":"li","lines":"67,68"}},{"content":"If age is entered inaccurately, a child may miss age-appropriate protections","children":[],"payload":{"tag":"li","lines":"68,69"}},{"content":"Safety settings help only if a child understands them and uses them consistently","children":[],"payload":{"tag":"li","lines":"69,71"}}],"payload":{"tag":"h3","lines":"66,67"}}],"payload":{"tag":"h2","lines":"53,54"}},{"content":"Why Young Adults Are Still at Risk","children":[{"content":"Snapchat remains heavily used by people under 30 &#x2014; exposure does not stop at school-leaving age","children":[],"payload":{"tag":"li","lines":"72,73"}},{"content":"Risks <strong>evolve</strong> rather than vanish:","children":[{"content":"dating/hookup contexts and coercive relationships","children":[],"payload":{"tag":"li","lines":"74,75"}},{"content":"ex-partner monitoring and coercive control","children":[],"payload":{"tag":"li","lines":"75,76"}},{"content":"campus drug markets and nightlife exposure","children":[],"payload":{"tag":"li","lines":"76,77"}},{"content":"workplace/professional reputation harm","children":[],"payload":{"tag":"li","lines":"77,78"}},{"content":"financial scams targeting first-time earners or students","children":[],"payload":{"tag":"li","lines":"78,79"}}],"payload":{"tag":"li","lines":"73,79"}},{"content":"Young adults often have:","children":[{"content":"more autonomy but less supervision","children":[],"payload":{"tag":"li","lines":"80,81"}},{"content":"more nightlife/travel/dating exposure","children":[],"payload":{"tag":"li","lines":"81,82"}},{"content":"more to lose if images, messages, or location data are weaponised","children":[],"payload":{"tag":"li","lines":"82,83"}},{"content":"higher sexting volume &#x2192; career, reputational, and legal ruin","children":[],"payload":{"tag":"li","lines":"83,85"}}],"payload":{"tag":"li","lines":"79,85"}}],"payload":{"tag":"h2","lines":"71,72"}},{"content":"The Main Danger Clusters","children":[{"content":"1) Grooming, Sexual Coercion &amp; Sextortion","children":[{"content":"Typical Pattern","children":[{"content":"Offender poses as peer, admirer, or romantic interest","children":[],"payload":{"tag":"li","lines":"89,90"}},{"content":"Conversation quickly becomes sexual","children":[],"payload":{"tag":"li","lines":"90,91"}},{"content":"Victim pushed to send images or join video call","children":[],"payload":{"tag":"li","lines":"91,92"}},{"content":"Offender demands more images, money, or compliance under threat of exposure","children":[],"payload":{"tag":"li","lines":"92,93"}},{"content":"Demands <strong>always escalate</strong> &#x2014; they do not end with compliance","children":[],"payload":{"tag":"li","lines":"93,94"}}],"payload":{"tag":"h4","lines":"88,89"}},{"content":"Why Snapchat Is Fertile Ground","children":[{"content":"Disappearing-message culture makes risky sharing feel less serious","children":[],"payload":{"tag":"li","lines":"95,96"}},{"content":"Camera-first communication speeds up intimacy","children":[],"payload":{"tag":"li","lines":"96,97"}},{"content":"Young users assume contacts are &quot;basically friends&quot;","children":[],"payload":{"tag":"li","lines":"97,98"}},{"content":"Evidence disappears before parents/teachers can see it","children":[],"payload":{"tag":"li","lines":"98,99"}},{"content":"Quick Add connects strangers &#x2014; even with <strong>no mutual contacts</strong>","children":[],"payload":{"tag":"li","lines":"99,100"}},{"content":"Cartoon avatars, Bitmoji, and filters let predators pose as younger","children":[],"payload":{"tag":"li","lines":"100,101"}}],"payload":{"tag":"h4","lines":"94,95"}},{"content":"Evidence of Scale","children":[{"content":"<strong>NSPCC UK (2024/25)</strong>: 7,263 &quot;Sexual Communication with a Child&quot; offences; where platform known, <strong>40&#x2013;48%</strong> involved Snapchat","children":[],"payload":{"tag":"li","lines":"102,103"}},{"content":"Offences nearly <strong>doubled</strong> since 2017/18","children":[],"payload":{"tag":"li","lines":"103,104"}},{"content":"80% of targeted children were <strong>girls</strong>; youngest recorded victim was <strong>4 years old</strong>","children":[],"payload":{"tag":"li","lines":"104,105"}},{"content":"<strong>Snap&apos;s own 2024 study</strong>: 23% of 13&#x2013;24-year-olds surveyed were sextortion victims across all platforms","children":[],"payload":{"tag":"li","lines":"105,106"}},{"content":"51% had been lured into risky situations that could lead to sextortion","children":[],"payload":{"tag":"li","lines":"106,107"}},{"content":"<strong>1 in 7</strong> youth victims engaged in <strong>self-harm</strong> as a result","children":[],"payload":{"tag":"li","lines":"107,108"}},{"content":"Most frequent victims aged <strong>13&#x2013;15</strong> (Thorn, 2025)","children":[],"payload":{"tag":"li","lines":"108,109"}},{"content":"Girls &amp; LGBTQIA+ youth: threatened for additional sexual imagery; boys: targeted for <strong>money</strong>","children":[],"payload":{"tag":"li","lines":"109,110"}},{"content":"FBI: financially motivated sextortion victims typically males aged 14&#x2013;17; alarming number of suicides [FBI]","children":[],"payload":{"tag":"li","lines":"110,111"}},{"content":"Thorn + NCMEC: average 812 sextortion reports per week; Instagram and Snapchat most common platforms [Thorn + NCMEC 2024]","children":[],"payload":{"tag":"li","lines":"111,112"}},{"content":"Internal Snap email (2022): ~<strong>10,000 sextortion reports per month</strong> &#x2014; &quot;only a fraction of the total abuse&quot;","children":[],"payload":{"tag":"li","lines":"112,113"}},{"content":"One flagged account had <strong>75 complaints</strong> yet remained active","children":[],"payload":{"tag":"li","lines":"113,114"}},{"content":"Predator-authored &quot;Sextortion Handbook&quot; using Snap Maps to target schools","children":[],"payload":{"tag":"li","lines":"114,115"}}],"payload":{"tag":"h4","lines":"101,102"}},{"content":"CSAM (Child Sexual Abuse Material)","children":[{"content":"Snapchat submitted <strong>752,000+ reports</strong> to NCMEC CyberTipline in 2025","children":[],"payload":{"tag":"li","lines":"116,117"}},{"content":"\n<blockquote data-lines=\"117,118\">\n<p data-lines=\"117,118\">80% of reports with law enforcement feedback deemed <strong>inactionable</strong> &#x2014; information &quot;not useful&quot;</p>\n</blockquote>","children":[],"payload":{"tag":"li","lines":"117,118"}},{"content":"NM Attorney General undercover sting: 10,000 records linking Snapchat to CSAM on dark web","children":[],"payload":{"tag":"li","lines":"118,119"}},{"content":"Snapchat identified as <strong>largest source</strong> of imagery among investigated dark web sites","children":[],"payload":{"tag":"li","lines":"119,120"}},{"content":"Since 2017: Snapchat identified as <strong>&quot;the pedophile&apos;s go-to exploitation tool&quot;</strong> (Sen. Dick Durbin)","children":[],"payload":{"tag":"li","lines":"120,121"}},{"content":"Almost half of all CSAM imagery reports over seven years came from Snapchat","children":[],"payload":{"tag":"li","lines":"121,122"}}],"payload":{"tag":"h4","lines":"115,116"}},{"content":"Young-Adult Version","children":[{"content":"Revenge porn / non-consensual image sharing","children":[],"payload":{"tag":"li","lines":"123,124"}},{"content":"Breakup blackmail and coercive control","children":[],"payload":{"tag":"li","lines":"124,125"}},{"content":"Sexual coercion after dating-app or nightlife crossover","children":[],"payload":{"tag":"li","lines":"125,126"}},{"content":"59% of Snapchat users have received <strong>unsolicited nude images</strong>","children":[],"payload":{"tag":"li","lines":"126,127"}},{"content":"22% of teens reported sending nudes via Snapchat (Cyberbullying Research Center)","children":[],"payload":{"tag":"li","lines":"127,129"}}],"payload":{"tag":"h4","lines":"122,123"}}],"payload":{"tag":"h3","lines":"87,88"}},{"content":"2) Unwanted Contact, Fake Identities &amp; &quot;Friend-Like&quot; Access","children":[{"content":"Risk Is Not Just &quot;Stranger Danger&quot;","children":[{"content":"Many bad contacts arrive as:","children":[{"content":"mutuals and classmates&apos; friends","children":[],"payload":{"tag":"li","lines":"132,133"}},{"content":"older teens/young adults posing as peers","children":[],"payload":{"tag":"li","lines":"133,134"}},{"content":"people imported from phone contacts or suggested via discovery tools","children":[],"payload":{"tag":"li","lines":"134,135"}},{"content":"53% of teens faced potential grooming interactions (2024 survey data)","children":[],"payload":{"tag":"li","lines":"135,136"}}],"payload":{"tag":"li","lines":"131,136"}}],"payload":{"tag":"h4","lines":"130,131"}},{"content":"Snapchat Safeguards Exist But Are Insufficient","children":[{"content":"Teens are harder for strangers to find","children":[],"payload":{"tag":"li","lines":"137,138"}},{"content":"In-chat warnings appear in some suspicious-contact situations","children":[],"payload":{"tag":"li","lines":"138,139"}},{"content":"But harm often comes from <strong>weak ties</strong> rather than obvious strangers","children":[],"payload":{"tag":"li","lines":"139,140"}},{"content":"Young users accept adds for status, curiosity, scores, or boredom","children":[],"payload":{"tag":"li","lines":"140,141"}},{"content":"Once a contact is accepted, the interaction feels <strong>socially normalised</strong>","children":[],"payload":{"tag":"li","lines":"141,143"}}],"payload":{"tag":"h4","lines":"136,137"}}],"payload":{"tag":"h3","lines":"129,130"}},{"content":"3) Drug Sales, Fentanyl &amp; Criminal Recruitment","children":[{"content":"Scale of the Epidemic","children":[{"content":"<strong>63 victim families</strong> filed fentanyl lawsuits against Snap Inc. (ages 14&#x2013;22; only <strong>2 survived</strong>)","children":[],"payload":{"tag":"li","lines":"145,146"}},{"content":"Fentanyl overdoses became a <strong>leading cause of teen death</strong> since 2020","children":[],"payload":{"tag":"li","lines":"146,147"}},{"content":"2019&#x2013;2021: teen fentanyl deaths <strong>tripled</strong>","children":[],"payload":{"tag":"li","lines":"147,148"}},{"content":"2020: 1,630 teens died from overdoses (nearly double 2019); +10% again in 2021","children":[],"payload":{"tag":"li","lines":"148,149"}},{"content":"DEA: 60% of seized counterfeit pills contained a <strong>potentially lethal dose</strong> of fentanyl","children":[],"payload":{"tag":"li","lines":"149,150"}},{"content":"FBI investigating Snapchat&apos;s role in fentanyl-laced pill distribution","children":[],"payload":{"tag":"li","lines":"150,151"}},{"content":"Fentanyl killed more teens than &quot;COVID, car accidents, or suicide&quot; (lawsuit filing)","children":[],"payload":{"tag":"li","lines":"151,152"}}],"payload":{"tag":"h4","lines":"144,145"}},{"content":"How Snapchat Facilitates Drug Sales","children":[{"content":"Disappearing messages <strong>erase transaction evidence</strong> automatically","children":[],"payload":{"tag":"li","lines":"153,154"}},{"content":"Drug emoji codes bypass keyword filters","children":[],"payload":{"tag":"li","lines":"154,155"}},{"content":"Snap Map geo-locator connects dealers to <strong>nearby teens</strong>","children":[],"payload":{"tag":"li","lines":"155,156"}},{"content":"&quot;My Eyes Only&quot; lets dealers store/hide customer info","children":[],"payload":{"tag":"li","lines":"156,157"}},{"content":"Quick visual catalogues and coded slang","children":[],"payload":{"tag":"li","lines":"157,158"}},{"content":"A 2019 security audit warned: purchasing drugs takes <strong>under 1 minute</strong> on Snapchat","children":[],"payload":{"tag":"li","lines":"158,159"}},{"content":"Snap knew since <strong>at least 2019</strong> that dealers exploited disappearing messages","children":[],"payload":{"tag":"li","lines":"159,160"}},{"content":"Colorado AG report (2023): Snapchat singled out as unique challenge for law enforcement","children":[],"payload":{"tag":"li","lines":"160,161"}}],"payload":{"tag":"h4","lines":"152,153"}},{"content":"Common Patterns","children":[{"content":"Counterfeit pills sold as Xanax / Percocet / Adderall / Oxycodone","children":[],"payload":{"tag":"li","lines":"162,163"}},{"content":"Vapes, alcohol, or other age-restricted products marketed to minors","children":[],"payload":{"tag":"li","lines":"163,164"}},{"content":"Local dealing, drop-offs, or introductions through youth networks","children":[],"payload":{"tag":"li","lines":"164,165"}},{"content":"Pressure to transport goods or act as intermediary","children":[],"payload":{"tag":"li","lines":"165,166"}},{"content":"EC 2026: Snapchat may have exposed minors to information about illegal goods and age-restricted products [EC 2026]","children":[],"payload":{"tag":"li","lines":"166,167"}}],"payload":{"tag":"h4","lines":"161,162"}},{"content":"Real Cases","children":[{"content":"14-year-old Alexander Neville: died after buying a single fentanyl-laced pill via Snapchat","children":[],"payload":{"tag":"li","lines":"168,169"}},{"content":"13-year-old &quot;Michael&quot;: connected with dealer on Snapchat, took fentanyl-laced pill, stopped breathing &#x2014; one of only 2 survivors","children":[],"payload":{"tag":"li","lines":"169,170"}},{"content":"Dealer &quot;Mel&quot;/Leach: advertised fentanyl to <strong>hundreds</strong> of teens; sentenced to 20 years","children":[],"payload":{"tag":"li","lines":"170,171"}},{"content":"Texas AG (Feb 2026), Florida AG (Apr 2025), NM AG (Sep 2024): all sued Snap Inc.","children":[],"payload":{"tag":"li","lines":"171,172"}}],"payload":{"tag":"h4","lines":"167,168"}},{"content":"Weapons Sales","children":[{"content":"NM case: two teens (14 &amp; 15) murdered with a gun purchased through Snapchat","children":[],"payload":{"tag":"li","lines":"173,174"}},{"content":"Perpetrators recorded beatings via Snapchat Memories","children":[],"payload":{"tag":"li","lines":"174,175"}},{"content":"Snap <strong>did not report</strong> the activity to law enforcement","children":[],"payload":{"tag":"li","lines":"175,177"}}],"payload":{"tag":"h4","lines":"172,173"}}],"payload":{"tag":"h3","lines":"143,144"}},{"content":"4) Cyberbullying, Harassment &amp; Peer Abuse","children":[{"content":"Forms of Harm","children":[{"content":"Insulting or threatening chats","children":[],"payload":{"tag":"li","lines":"179,180"}},{"content":"Exclusion from group exchanges","children":[],"payload":{"tag":"li","lines":"180,181"}},{"content":"Pressure to send images","children":[],"payload":{"tag":"li","lines":"181,182"}},{"content":"Screenshot-based humiliation","children":[],"payload":{"tag":"li","lines":"182,183"}},{"content":"Fake accounts and impersonation","children":[],"payload":{"tag":"li","lines":"183,184"}},{"content":"Coordinated shaming across private oad":{"tag":"li","lines":"199,200"}},{"content":"Snap Map makes social exclusion <strong>visible in real-time</strong> (seeing friends together without you)","children":[],"payload":{"tag":"li","lines":"200,201"}}],"payload":{"tag":"h4","lines":"195,196"}},{"content":"CDC Evidence","children":[{"content":"Frequent social-media use associated with higher prevalence of school bullying, electronic bullying, persistent sadness/hopelessness, and suicide-risk indicators [CDC 2024]","children":[],"payload":{"tag":"li","lines":"202,204"}}],"payload":{"tag":"h4","lines":"201,202"}}],"payload":{"tag":"h3","lines":"177,178"}},{"content":"5) Compulsive Use, FOMO, Sleep Disruption &amp; Attention Drain","children":[{"content":"Engineered for Fast Return Visits","children":[{"content":"Snaps waiting to be opened","children":[],"payload":{"tag":"li","lines":"206,207"}},{"content":"Streak maintenance pressure","children":[],"payload":{"tag":"li","lines":"207,208"}},{"content":"Friend reciprocity obligation","children":[],"payload":{"tag":"li","lines":"208,209"}},{"content":"Notifications and social vigilance","children":[],"payload":{"tag":"li","lines":"209,210"}},{"content":"Pull-to-refresh and infinite scroll (variable-ratio reinforcement &#x2014; slot-machine psychology)","children":[],"payload":{"tag":"li","lines":"210,211"}}],"payload":{"tag":"h4","lines":"205,206"}},{"content":"Harm Mechanisms","children":[{"content":"Fear of missing out (FOMO)","children":[],"payload":{"tag":"li","lines":"212,213"}},{"content":"Obligation to keep streaks alive","children":[],"payload":{"tag":"li","lines":"213,214"}},{"content":"Late-night checking &#x2192; sleep disruption","children":[],"payload":{"tag":"li","lines":"214,215"}},{"content":"Reduced attention at school, college, or work","children":[],"payload":{"tag":"li","lines":"215,216"}},{"content":"Anxiety when a message or streak is not returned","children":[],"payload":{"tag":"li","lines":"216,217"}},{"content":"Snap Map shows <strong e impairment, organ damage, addiction vulnerability","children":[],"payload":{"tag":"li","lines":"424,425"}},{"content":"Youth hospitalised for psychiatric issues show disproportionate Snapchat usage patterns","children":[],"payload":{"tag":"li","lines":"425,427"}}],"payload":{"tag":"h3","lines":"419,420"}},{"content":"Societal &amp; Generational","children":[{"content":"Normalisation of ephemeral/unaccountable communication &#x2192; erosion of digital citizenship norms","children":[],"payload":{"tag":"li","lines":"428,429"}},{"content":"Generation growing up with surveillance-as-default &#x2192; altered privacy expectations","children":[],"payload":{"tag":"li","lines":"429,430"}},{"content":"Declining face-to-face social skills across cohort","children":[],"payload":{"tag":"li","lines":"430,431"}},{"content":"Rising demand on mental health services driven by social media-related presentations","children":[],"payload":{"tag":"li","lines":"431,432"}},{"content":"Intergenerational pattern: digitally harmed teens become parents with limited frameworks for protecting their own children","children":[],"payload":{"tag":"li","lines":"432,434"}}],"payload":{"tag":"h3","lines":"427,428"}}],"payload":{"tag":"h2","lines":"391,392"}},{"content":"The Biggest Myths","children":[{"content":"<strong>&quot;It disappears, so it is low-stakes&quot;</strong> &#x2192; FALSE: recipients save, platforms retain, law enforcement can subpoena","children":[],"payload":{"tag":"li","lines":"435,436"}},{"content":"<strong>&quot;Only strangers are dangerous&quot;</strong> &#x2192; FALSE: real harm often comes from peers, exes, or friends-of-friends","children":[],"payload":{"tag":"li","lines":"436,437"}},{"content":"<strong>&quot;If the account is private, the risk is gone&quot;</strong> &#x2192; FALSE: coercion, blackmail, bullying, and stalking thrive in private spaces","children":[],"payload":{"tag":"li","lines":"437,438"}},{"content":"<strong>&quot;Only children are vulnerable&quot;</strong> &#x2192; FALSE: young adults are frequent targets for blackmail, stalking, scams, and drug sales","children":[],"payload":{"tag":"li","lines":"438,439"}},{"content":"<strong>&quot;Safety features solve the problem&quot;</strong> &#x2192; FALSE: they lower risk but do not remove the underlying incentives and blind spots","children":[],"payload":{"tag":"li","lines":"439,440"}},{"content":"<strong>&quot;Screenshot notifications mean content is safe&quot;</strong> &#x2192; FALSE: other devices, third-party apps, and re-sharing bypass notifications entirely","children":[],"payload":{"tag":"li","lines":"440,442"}}],"payload":{"tag":"h2","lines":"434,435"}},{"content":"What Snapchat&apos;s Safeguards Get Right","children":[{"content":"Teen accounts are private by default [Snap official]","children":[],"payload":{"tag":"li","lines":"443,444"}},{"content":"Contact restricted to friends / existing-contact contexts [Snap official]","children":[],"payload":{"tag":"li","lines":"444,445"}},{"content":"Younger teens (13&#x2013;15) do not have Public Profiles [Snap official]","children":[],"payload":{"tag":"li","lines":"445,446"}},{"content":"Older-teen public content more constrained than adult content [Snap official]","children":[],"payload":{"tag":"li","lines":"446,447"}},{"content":"Snap Map is off by default [Snap official]","children":[],"payload":{"tag":"li","lines":"447,448"}},{"content":"In-chat warnings exist for some non-mutual / non-contact interactions [Snap official]","children":[],"payload":{"tag":"li","lines":"448,449"}},{"content":"Family Center: parents can monitor friend lists, disable My AI, view location [Snap official]","children":[],"payload":{"tag":"li","lines":"449,450"}},{"content":"Proactive moderation and public transparency reporting [Snap official]","children":[],"payload":{"tag":"li","lines":"450,452"}}],"payload":{"tag":"h2","lines":"442,443"}},{"content":"Why Those Safeguards Are Not a Complete Answer","children":[{"content":"<strong>Age verification is weak</strong>: self-declared birth date only; EU Commission has explicitly questioned this [EC 2026]","children":[],"payload":{"tag":"li","lines":"453,454"}},{"content":"<strong>Strongest against obvious strangers</strong> but many harms come from accepted contacts, weak ties, and peers","children":[],"payload":{"tag":"li","lines":"454,455"}},{"content":"<strong>Reduce some public exposure</strong> but not private coercion, panic, shame, or impulsive sharing","children":[],"payload":{"tag":"li","lines":"455,456"}},{"content":"<strong>Do not prevent underage access</strong>: UK evidence shows large numbers of under-13s on social apps [Ofcom 2025; UK Gov 2026]","children":[],"payload":{"tag":"li","lines":"456,457"}},{"content":"<strong>Do not remove design pressures</strong>: streaks, FOMO, image comparison, late-night checking, location over-sharing","children":[],"payload":{"tag":"li","lines":"457,458"}},{"content":"<strong>Family Center is opt-in</strong> and requires the child&apos;s cooperation &#x2014; no full message monitoring, no screen-time caps","children":[],"payload":{"tag":"li","lines":"458,459"}},{"content":"<strong>Reactive, not proactive</strong>: proactive drug detection only launched after years of fentanyl deaths and lawsuits","children":[],"payload":{"tag":"li","lines":"459,460"}},{"content":"<strong>NCMEC report quality</strong>: over 80% of Snap&apos;s 752,000+ reports deemed inactionable by law enforcement","children":[],"payload":{"tag":"li","lines":"460,461"}},{"content":"<strong>Evidence of counter-productive timing</strong>: dealer accounts deleted just before planned law enforcement arrests","children":[],"payload":{"tag":"li","lines":"461,463"}}],"payload":{"tag":"h2","lines":"452,453"}},{"content":"Company Knowledge vs. Action","children":[{"content":"Internal Awareness (Documented)","children":[{"content":"Employee warnings about child exploitation <strong>ignored for years</strong>","children":[],"payload":{"tag":"li","lines":"465,466"}},{"content":"Internal email (2017): &quot;we should add more addicting features&quot; re streaks","children":[],"payload":{"tag":"li","lines":"466,467"}},{"content":"Employees questioned whether streaks were &quot;healthy&quot; &#x2014; company chose retention","children":[],"payload":{"tag":"li","lines":"467,468"}},{"content":"Employees flagged grooming/sextortion reports &quot;falling through the cracks&quot;","children":[],"payload":{"tag":"li","lines":"468,469"}},{"content":"Company position: addressing child grooming would &quot;create disproportionate admin costs&quot;","children":[],"payload":{"tag":"li","lines":"469,470"}},{"content":"Internal email (2021): Snapchat recorded as <strong>most-used platform</strong> for technology-facilitated child sexual assaults since 2017","children":[],"payload":{"tag":"li","lines":"470,471"}},{"content":"Internal circulation of external report identifying: sexual exploitation, grooming, &quot;capping&quot;, CSAM trade, predator advice on evading safety, human exploitation","children":[],"payload":{"tag":"li","lines":"471,472"}}],"payload":{"tag":"h3","lines":"464,465"}},{"content":"Scale of Legal Exposure","children":[{"content":"<strong>6,000+</strong> lawsuits naming Snap Inc. as defendant (MDL/JCCP, 2022&#x2013;2025)","children":[],"payload":{"tag":"li","lines":"473,474"}},{"content":"63 fentanyl victim family lawsuits","children":[],"payload":{"tag":"li","lines":"474,475"}},{"content":"State AG actions: NM, TX, FL, NV","children":[],"payload":{"tag":"li","lines":"475,476"}},{"content":"EU DSA formal investigation (March 2026)","children":[],"payload":{"tag":"li","lines":"476,477"}},{"content":"UK ICO provisional enforcement (2023)","children":[],"payload":{"tag":"li","lines":"477,478"}},{"content":"Product liability theory: Snapchat as a <strong>defective product</strong> &#x2014; could reshape Section 230 globally","children":[],"payload":{"tag":"li","lines":"478,480"}}],"payload":{"tag":"h3","lines":"472,473"}}],"payload":{"tag":"h2","lines":"463,464"}},{"content":"How Snapchat Compares with Similar Platforms","children":[{"content":"More Concerning Than Some Platforms For","children":[{"content":"Disappearing-message norms","children":[],"payload":{"tag":"li","lines":"482,483"}},{"content":"Rapid visual intimacy","children":[],"payload":{"tag":"li","lines":"483,484"}},{"content":"Streak-driven obligation","children":[],"payload":{"tag":"li","lines":"484,485"}},{"content":"Location-sharing becoming socially normal","children":[],"payload":{"tag":"li","lines":"485,486"}},{"content":"Youth-density in friendship networks","children":[],"payload":{"tag":"li","lines":"486,487"}},{"content":"Evidence destruction making law enforcement cooperation uniquely difficult","children":[],"payload":{"tag":"li","lines":"487,488"}}],"payload":{"tag":"h3","lines":"481,482"}},{"content":"Often Less Concerning Than TikTok/Instagram For","children":[{"content":"Public virality","children":[],"payload":{"tag":"li","lines":"489,490"}},{"content":"Obvious follower-count pressure","children":[],"payload":{"tag":"li","lines":"490,491"}},{"content":"Large-scale comment pile-ons","children":[],"payload":{"tag":"li","lines":"491,492"}},{"content":"Influencer-driven beauty comparison","children":[],"payload":{"tag":"li","lines":"492,493"}}],"payload":{"tag":"h3","lines":"488,489"}},{"content":"But Similar Platforms Share Many Structural Harms","children":[{"content":"<strong>Instagram/TikTok</strong>: stronger public comparison and recommendation pressure; sextortion often begins there too","children":[],"payload":{"tag":"li","lines":"494,495"}},{"content":"<strong>Discord/Telegram/WhatsApp</strong>: private groups, persistence, forwarding, lower adult visibility","children":[],"payload":{"tag":"li","lines":"495,496"}},{"content":"Predators use Discord to <strong>redirect victims to Snapchat</strong> for exploitation","children":[],"payload":{"tag":"li","lines":"496,497"}}],"payload":{"tag":"h3","lines":"493,494"}},{"content":"Practical Conclusion","children":[{"content":"If a child is not ready for Instagram, TikTok, Discord, or private group messaging, they are <strong>usually not ready for Snapchat</strong> either","children":[],"payload":{"tag":"li","lines":"498,499"}},{"content":"Snapchat&apos;s private feel should not be mistaken for safety","children":[],"payload":{"tag":"li","lines":"499,501"}}],"payload":{"tag":"h3","lines":"497,498"}}],"payload":{"tag":"h2","lines":"480,481"}},{"content":"Verdict by Age Band","children":[{"content":"Under 13","children":[{"content":"Should <strong>not</strong> be on Snapchat","children":[],"payload":{"tag":"li","lines":"503,504"}},{"content":"Age-minimum issue alone is enough reason for strong concern","children":[],"payload":{"tag":"li","lines":"504,505"}}],"payload":{"tag":"h3","lines":"502,503"}},{"content":"13&#x2013;15","children":[{"content":"<strong>Highest caution band</strong> among lawful users","children":[],"payload":{"tag":"li","lines":"506,507"}},{"content":"Many mature enough for messaging, but not mature enough to manage coercion, location-sharing, intimate-image risk, or streak pressure consistently","children":[],"payload":{"tag":"li","lines":"507,508"}},{"content":"Most frequent victims of sextortion (Thorn 2025)","children":[],"payload":{"tag":"li","lines":"508,509"}}],"payload":{"tag":"h3","lines":"505,506"}},{"content":"16&#x2013;17","children":[{"content":"Still <strong>high risk</strong>","children":[],"payload":{"tag":"li","lines":"510,511"}},{"content":"Some public-facing features widen exposure","children":[],"payload":{"tag":"li","lines":"511,512"}},{"content":"Sextortion, bullying, and location harm remain major concerns","children":[],"payload":{"tag":"li","lines":"512,513"}}],"payload":{"tag":"h3","lines":"509,510"}},{"content":"18&#x2013;24","children":[{"content":"Risk shifts from parental-oversight failure to <strong>personal-safety and reputation risk</strong>","children":[],"payload":{"tag":"li","lines":"514,515"}},{"content":"Still high-risk if used casually for sex, location-sharing, drug access, or volatile relationships","children":[],"payload":{"tag":"li","lines":"515,517"}}],"payload":{"tag":"h3","lines":"513,514"}}],"payload":{"tag":"h2","lines":"501,502"}},{"content":"Regulatory &amp; Legal Landscape (2024&#x2013;2026)","children":[{"content":"EU Digital Services Act (DSA)","children":[{"content":"<strong>26 March 2026</strong>: European Commission opened formal investigation into Snapchat [EC 2026]","children":[],"payload":{"tag":"li","lines":"519,520"}},{"content":"Five areas: age verification, adult impersonation, grooming risk, illegal content, recommender systems","children":[],"payload":{"tag":"li","lines":"520,521"}},{"content":"&quot;Core features such as disappearing messages, streaks, Discover, My AI and live location sharing make this service both highly consuming and very risky for children&quot; &#x2014; 5Rights Foundation","children":[],"payload":{"tag":"li","lines":"521,522"}},{"content":"Potential fines: up to <strong>6% of global annual turnover</strong>","children":[],"payload":{"tag":"li","lines":"522,523"}},{"content":"Preceded by preliminary findings against TikTok (Feb 2026) and porn platforms","children":[],"payload":{"tag":"li","lines":"523,524"}}],"payload":{"tag":"h3","lines":"518,519"}},{"content":"US State Attorneys General","children":[{"content":"<strong>New Mexico</strong> (Sep 2024): &quot;breeding ground&quot; for predators; undercover operation","children":[],"payload":{"tag":"li","lines":"525,526"}},{"content":"<strong>Florida</strong> (Apr 2025): failure to protect children","children":[],"payload":{"tag":"li","lines":"526,527"}},{"content":"<strong>Texas</strong> (Feb 2026): explicit content exposure, deceptive safety claims","children":[],"payload":{"tag":"li","lines":"527,528"}},{"content":"<strong>Nevada</strong>: &quot;intentionally engineered&quot; youth engagement despite known risks","children":[],"payload":{"tag":"li","lines":"528,529"}}],"payload":{"tag":"h3","lines":"524,525"}},{"content":"US Federal","children":[{"content":"6,000+ lawsuits (MDL/JCCP, 2022&#x2013;2025)","children":[],"payload":{"tag":"li","lines":"530,531"}},{"content":"Senate Judiciary Committee (Apr 2026): 752,000+ NCMEC reports; 80%+ inactionable","children":[],"payload":{"tag":"li","lines":"531,532"}},{"content":"Bipartisan James T. Woods Act","children":[],"payload":{"tag":"li","lines":"532,533"}},{"content":"DEA/FBI active investigations","children":[],"payload":{"tag":"li","lines":"533,534"}},{"content":"64-family fentanyl lawsuit &#x2014; product liability theory challenging Section 230","children":[],"payload":{"tag":"li","lines":"534,535"}}],"payload":{"tag":"h3","lines":"529,530"}},{"content":"UK","children":[{"content":"ICO provisional enforcement re My AI privacy (2023)","children":[],"payload":{"tag":"li","lines":"536,537"}},{"content":"Online Safety Act obligations forthcoming","children":[],"payload":{"tag":"li","lines":"537,538"}},{"content":"NSPCC: consistent calls for mandatory safety-by-design","children":[],"payload":{"tag":"li","lines":"538,539"}}],"payload":{"tag":"h3","lines":"535,536"}},{"content":"Emerging Jurisprudence","children":[{"content":"Courts allowing parents to hold platforms accountable for <strong>facilitating drug sales</strong> (first-ever ruling)","children":[],"payload":{"tag":"li","lines":"540,541"}},{"content":"Product liability theory: Snapchat as a <strong>defective product</strong> &#x2014; not just a content host","children":[],"payload":{"tag":"li","lines":"541,542"}},{"content":"If successful, could reshape platform accountability globally","children":[],"payload":{"tag":"li","lines":"542,544"}}],"payload":{"tag":"h3","lines":"539,540"}}],"payload":{"tag":"h2","lines":"517,518"}},{"content":"Recommendations","children":[{"content":"For Parents &amp; Caregivers","children":[{"content":"Delay Snapchat access &#x2014; ideally until <strong>age 16+</strong>; under-13 use should be prohibited","children":[],"payload":{"tag":"li","lines":"546,547"}},{"content":"If permitted: enable <strong>Ghost Mode</strong> immediately; activate Family Centre; restrict Discover/Spotlight; disable My AI","children":[],"payload":{"tag":"li","lines":"547,548"}},{"content":"Discuss sextortion, drug emoji codes, and stranger-contact risks openly","children":[],"payload":{"tag":"li","lines":"548,549"}},{"content":"Monitor for signs: sleep disruption, mood swings, streak anxiety, secrecy about phone use","children":[],"payload":{"tag":"li","lines":"549,550"}},{"content":"Know that disappearing messages mean you <strong>cannot retroactively review</strong> content","children":[],"payload":{"tag":"li","lines":"550,551"}},{"content":"Learn the coded drug emojis teens and dealers use","children":[],"payload":{"tag":"li","lines":"551,552"}}],"payload":{"tag":"h3","lines":"545,546"}},{"content":"For Schools &amp; Educators","children":[{"content":"Include Snapchat-specific digital literacy in safeguarding curricula","children":[],"payload":{"tag":"li","lines":"553,554"}},{"content":"Teach recognition of drug emojis, sextortion tactics, grooming red flags, and the &quot;ephemeral myth&quot;","children":[],"payload":{"tag":"li","lines":"554,555"}},{"content":"Provide reporting pathways and pastoral support for victims","children":[],"payload":{"tag":"li","lines":"555,556"}},{"content":"Reference NCMEC Netsmartz for age-appropriate resources","children":[],"payload":{"tag":"li","lines":"556,557"}},{"content":"Address streak culture as a form of <strong>compulsion</strong>, not just socialising","children":[],"payload":{"tag":"li","lines":"557,558"}}],"payload":{"tag":"h3","lines":"552,553"}},{"content":"For Policymakers &amp; Regulators","children":[{"content":"Mandate robust age verification (beyond self-declaration)","children":[],"payload":{"tag":"li","lines":"559,560"}},{"content":"Require message retention for law enforcement
